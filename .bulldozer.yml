# This file is synchronized from EWA-Services/EWA-Actions
# Do not modify this file directly, all changes will be lost/overwritten
---
version: 1

merge:
  trigger:
    labels: [automerge]

  method: squash

  options:
    squash:
      title: pull_request_title
      body: pull_request_body

  delete_after_merge: true

  # Must be true for repositories protected by GitHub Rulesets
  # Bulldozer sees ruleset-protected repos as having "no checks"
  # Without this, Bulldozer will refuse to merge PRs in those repos
  # Related: https://github.com/palantir/bulldozer/issues/617
  allow_merge_with_no_checks: true
