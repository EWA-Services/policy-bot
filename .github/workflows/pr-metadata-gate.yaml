# This workflow file is synchronized from EWA-Services/EWA-Actions
# Do not modify this file directly, all changes will be lost/overwritten
---
name: PR Metadata Gate

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - ready_for_review
      - synchronize
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions: {}

jobs:
  metadata-gate:
    uses: EWA-Services/EWA-Actions/.github/workflows/shareable-pr-metadata-gate.yaml@main
    permissions:
      actions: write
      checks: write
      contents: read
      issues: write
      pull-requests: write
    with:
      actions_ref: main
    secrets:
      FINN_DEVOPS_PERSONAL_ACCESS_TOKEN: ${{ secrets.FINN_DEVOPS_PERSONAL_ACCESS_TOKEN }}
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
      FINN_AI_CODER_GITHUB_APP_PRIVATE_KEY: ${{ secrets.FINN_AI_CODER_GITHUB_APP_PRIVATE_KEY }}
