---
name: Pre-commit Check

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  pre-commit-check:
    runs-on: finn-runners
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Restore cached
        id: cache-restore
        uses: actions/cache/restore@v4
        env:
          CACHE_KEY_PREFIX: ${{ runner.os }}-${{ github.repository }}-${{ github.workflow }}
        with:
          path: |
            ${{ env.HOME }}/.cache/pre-commit/
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        id: pre-commit
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          echo "Diffing from $BASE_SHA to $HEAD_SHA"
          pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA" --show-diff-on-failure

      - name: Generate diff patch
        if: failure()
        run: git diff --binary --no-color > pre-commit.patch

      - name: Upload diff patch
        if: always() && steps.pre-commit.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: pre-commit-diff-${{ github.run_id }}
          path: pre-commit.patch
          retention-days: 1

      - name: Save cached
        if: always() && steps.cache-restore.outputs.cache-hit != 'true'
        id: cache-save
        uses: actions/cache/save@v4
        env:
          CACHE_KEY_PREFIX: ${{ runner.os }}-${{ github.repository }}-${{ github.workflow }}
        with:
          path: |
            ${{ env.HOME }}/.cache/pre-commit/
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ hashFiles('.pre-commit-config.yaml') }}
