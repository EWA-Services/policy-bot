# This workflow file is synchronized from EWA-Services/EWA-Actions
# Do not modify this file directly, all changes will be lost/overwritten
#
# yamllint disable rule:line-length
---
name: Code Review

on:
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
  # checkov:skip=CKV_GHA_7: "Manual workflow_dispatch inputs are required for operator validation and debugging."
  workflow_dispatch:
    inputs:
      provider:
        description: Which direct CLI reviewer to run
        required: true
        default: codex
        type: choice
        options:
          - codex
      pr_number:
        description: Pull request number to review or respond on
        required: true
        type: string
      trigger_type:
        description: Review trigger type to simulate
        required: true
        default: pr_event
        type: choice
        options:
          - pr_event
          - pr_comment
          - inline_comment
      comment_body:
        description: Comment body to simulate for comment-driven runs
        required: false
        default: ""
        type: string
      comment_author:
        description: Comment author to simulate for workflow_dispatch
        required: false
        default: manual-dispatch
        type: string
      comment_id:
        description: Existing PR or inline review comment ID for comment-driven runs
        required: false
        default: ""
        type: string
      parent_comment_id:
        description: Parent comment ID when simulating a threaded comment reply
        required: false
        default: ""
        type: string
      file_path:
        description: File path for inline comment context
        required: false
        default: ""
        type: string
      line_number:
        description: Line number for inline comment context
        required: false
        default: ""
        type: string
      codex_version:
        description: Codex CLI version to install for direct CLI runs (latest or exact semver)
        required: true
        default: latest
        type: string
      codex_model:
        description: Codex model to use for direct CLI runs
        required: true
        default: gpt-5.5
        type: string
      codex_reasoning_effort:
        description: Codex reasoning effort for direct CLI runs (none|low|medium|high|xhigh)
        required: true
        default: xhigh
        type: string
      allow_code_push:
        description: Allow Codex to commit and push scoped PR fixes for this dispatch
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  code-review:
    uses: EWA-Services/EWA-Actions/.github/workflows/shareable-code-review.yaml@main
    permissions:
      actions: read
      checks: read
      contents: read
      issues: write
      pull-requests: write
    with:
      actions_ref: main
      provider: ${{ inputs.provider || 'codex' }}
      pr_number: ${{ inputs.pr_number || '' }}
      trigger_type: ${{ inputs.trigger_type || 'pr_event' }}
      comment_body: ${{ inputs.comment_body || '' }}
      comment_author: ${{ inputs.comment_author || 'manual-dispatch' }}
      comment_id: ${{ inputs.comment_id || '' }}
      parent_comment_id: ${{ inputs.parent_comment_id || '' }}
      file_path: ${{ inputs.file_path || '' }}
      line_number: ${{ inputs.line_number || '' }}
      codex_version: ${{ inputs.codex_version || 'latest' }}
      codex_model: ${{ inputs.codex_model || 'gpt-5.5' }}
      codex_reasoning_effort: ${{ inputs.codex_reasoning_effort || 'xhigh' }}
      allow_code_push: ${{ inputs.allow_code_push || false }}
    secrets:
      FINN_DEVOPS_PERSONAL_ACCESS_TOKEN: ${{ secrets.FINN_DEVOPS_PERSONAL_ACCESS_TOKEN }}
      PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
      FINN_AI_CODER_GITHUB_APP_PRIVATE_KEY: ${{ secrets.FINN_AI_CODER_GITHUB_APP_PRIVATE_KEY }}
      GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
# yamllint enable rule:line-length
